services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: parothegreat-portfolio
    restart: unless-stopped
    ports:
      - "80:80"         # HTTP — ganti ke "3000:80" kalau port 80 sudah dipakai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
